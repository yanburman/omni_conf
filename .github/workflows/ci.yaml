name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# This prevents multiple runs from the same branch from overlapping
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Don't kill Windows/Mac if Linux fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        # If the cache service hangs or throws punycode warnings, 
        # continue the build anyway instead of canceling.
        continue-on-error: true
        with:
          shared-key: "omni-conf-cache"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        # Ensures your cross-platform logic is clean
        run: cargo clippy --all-features -- -D warnings

      - name: Run Tests
        # The primary goal: verifies everything works
        run: cargo test --all-features